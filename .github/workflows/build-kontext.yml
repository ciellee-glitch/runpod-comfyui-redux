name: Build and Push (Kontext)

"on":
  push:
    branches: [main]
    paths: [Dockerfile.kontext]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.kontext
          push: true
          tags: |
            ciellee78/worker-comfyui-kontext:latest
            ciellee78/worker-comfyui-kontext:v1
